name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── CLI Binaries ─────────────────────────────────────────────────────────────
  build-cli:
    name: CLI · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,   os: ubuntu-latest,  ext: ""     }
          - { target: aarch64-unknown-linux-gnu,  os: ubuntu-latest,  ext: ""     }
          - { target: x86_64-apple-darwin,        os: macos-latest,   ext: ""     }
          - { target: aarch64-apple-darwin,       os: macos-latest,   ext: ""     }
          - { target: x86_64-pc-windows-msvc,     os: windows-latest, ext: ".exe" }

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild (Linux aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          pip install ziglang
          cargo install cargo-zigbuild

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --bin airlock --target ${{ matrix.target }}

      - name: Build (zigbuild)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo zigbuild --release --bin airlock --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          SRC="target/${{ matrix.target }}/release/airlock${{ matrix.ext }}"
          DST="dist/airlock-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.ext }}"
          cp "$SRC" "$DST"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # ── Python Wheels ─────────────────────────────────────────────────────────────
  build-wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features python
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-wheels
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing — no API token needed

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
